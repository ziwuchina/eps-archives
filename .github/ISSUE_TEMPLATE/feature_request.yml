name: ✨ Feature Request
description: 为 EPS 自动化提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ 功能描述
        描述你要的功能或改进。

  - type: textarea
    id: problem
    attributes:
      label: "解决什么问题"
      description: "这个功能解决什么痛点？"
      placeholder: "当前 ... 导致必须 ..."

  - type: textarea
    id: solution
    attributes:
      label: "期望方案"
      description: "你期望如何实现？"
      placeholder: "希望能够 ...

  - type: textarea
    id: alternatives
    attributes:
      label: "替代方案（可选）"
      description: "有没有考虑过其他方式？"

  - type: textarea
    id: context
    attributes:
      label: "附加上下文"
      description: "截图、日志、相关文档等"
